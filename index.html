<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Horizon Atlas</title>
  <meta name="description" content="A minimal Antinode demo: sign-in, secrets, and amAIra on a static site." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">Horizon Atlas</div>
    <div class="header-actions">
      <span id="session-chip" class="session-chip">Checking session…</span>
      <button id="account-btn" class="btn btn-text hidden" type="button">Account</button>
      <button id="signin-btn" class="btn btn-primary" type="button">Sign in</button>
      <button id="signout-btn" class="btn btn-text hidden" type="button">Sign out</button>
    </div>
  </header>

  <main class="layout">
    <section class="journal">
      <div id="gate" class="gate">
        <p>Sign in to write trail notes and load weather from your Antinode vault.</p>
        <button id="gate-signin-btn" class="btn btn-primary" type="button">Sign in</button>
      </div>

      <div id="workspace" class="workspace hidden">
        <div class="fields-row">
          <label class="field">
            <span class="label">Destination</span>
            <input id="destination" type="text" placeholder="Mount Tamalpais" value="Mount Tamalpais" />
          </label>
          <label class="field field-date">
            <span class="label">Date</span>
            <input id="entry-date" type="date" />
          </label>
        </div>

        <div class="weather" id="weather-card">
          <div class="weather-top">
            <span class="label">Conditions</span>
            <span id="secret-status" class="status-dot muted" title="Secret not loaded">Vault</span>
          </div>
          <p id="weather-copy" class="weather-copy muted">Sign in to load weather via your vault secret.</p>
        </div>

        <label class="field">
          <span class="label">Note</span>
          <textarea id="entry-body" rows="4" placeholder="Morning ridge loop…"></textarea>
        </label>

        <div class="actions">
          <button id="save-entry-btn" class="btn btn-primary" type="button">Save</button>
          <button id="refresh-weather-btn" class="btn btn-text" type="button">Refresh weather</button>
        </div>

        <div class="entries">
          <div class="label">Recent</div>
          <ul id="entries-list" class="entries-list"></ul>
        </div>
      </div>
    </section>

    <aside class="ai-panel">
      <div class="label">amAIra</div>
      <div id="antinode-ai" class="ai-mount"></div>
    </aside>
  </main>

  <footer class="site-footer muted">
  Antinode demo — <a href="https://antinode.site" target="_blank" rel="noopener noreferrer">antinode.site</a>
  </footer>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
